name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish macOS bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # Signing and notarisation run only when the secrets are configured;
      # without them the build still produces an unsigned, locally-runnable app.
      - name: Build
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build

      - name: Collect artifacts
        run: |
          mkdir -p dist-release
          cp src-tauri/target/release/bundle/dmg/*.dmg dist-release/ 2>/dev/null || true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          generate_release_notes: true
          draft: true
          body: |
            ## pgscope ${{ github.ref_name }}

            A desktop PostgreSQL explorer with a docked psql pane.

            <!-- Summarise notable changes here before publishing. -->

            **Note:** unsigned builds require a right-click → Open on first
            launch, or `xattr -dr com.apple.quarantine /Applications/pgscope.app`.

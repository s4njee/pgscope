# pgscope dev fixture — a throwaway PostgreSQL 16 instance seeded to look like the design.
#
#   docker compose -f dev/docker-compose.yml up -d
#   PGSCOPE_DEV_URL=postgres://pgscope:pgscope@localhost:54330/analytics_prod
#
# Everything is namespaced `pgscope-dev` so it cannot collide with other local stacks.
#
# Host port: plan.md §7 specifies 54329, but on this machine that port is held by an
# unrelated project (`postexplore`), so the default here is 54330. Override with
# PGSCOPE_DEV_PORT if you want a different one:
#     PGSCOPE_DEV_PORT=54329 docker compose -f dev/docker-compose.yml up -d

name: pgscope-dev

services:
  db:
    image: postgres:16
    container_name: pgscope-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: analytics_prod
      POSTGRES_USER: pgscope
      POSTGRES_PASSWORD: pgscope
      # Fast, deterministic initdb; this database is disposable.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "${PGSCOPE_DEV_PORT:-54330}:5432"
    volumes:
      - pgscope-dev-data:/var/lib/postgresql/data
      # Run in lexical order on first boot only (empty data dir).
      - ./seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
      - ./generate.sql:/docker-entrypoint-initdb.d/02-generate.sql:ro
    command:
      - postgres
      # Modest tuning so the ~1.2M row seed lands in well under a minute.
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=64MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - max_wal_size=4GB
      - -c
      - synchronous_commit=off
    healthcheck:
      # `pg_isready` alone goes green during initdb (the bootstrap server is up on a
      # unix socket), so also require the seeded data to be queryable over TCP.
      test:
        [
          "CMD-SHELL",
          "psql -h 127.0.0.1 -U pgscope -d analytics_prod -tAc 'SELECT count(*) FROM public.events' >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 60
      start_period: 120s

volumes:
  pgscope-dev-data:
    name: pgscope-dev-data
